<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>
hr{
  border:1px solid #00eaff;
  margin:0;
  margin-top:20px;
  margin-bottom:20px;
}
body{
  margin:0;
  background:black;
  color:#00eaff;
  font-family:monospace;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

input,button{
  padding:10px;
  border:1px solid #00eaff;
  background:black;
  color:#00eaff;
}

button{cursor:pointer}
button:hover{background:#00eaff22}

.error{color:red;margin-top:10px}

#app{
  display:none;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

h1{margin:0}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{font-size:12px}

.main{
  display:flex;
  gap:60px;
  margin-top:20px;
  align-items:flex-start;
}

.radar{
  width:240px;
  height:240px;
  min-width:240px;
  min-height:240px;
  border-radius:50%;
  border:2px solid #00eaff;
  box-shadow:0 0 50px #00eaff;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}

.radar::before{
  content:"";
  position:absolute;
  inset:20px;
  border-radius:50%;
  border:1px solid #00eaff44;
}
.radar::after{
  content:"";
  position:absolute;
  inset:50px;
  border-radius:50%;
  border:1px solid #00eaff22;
}

.sweep{
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(rgba(0,255,200,0.25) 0deg, transparent 60deg);
  border-radius:50%;
  animation:spin 2s linear infinite;
}

.dot{
  position:absolute;
  width:6px;
  height:6px;
  background:#00ffcc;
  border-radius:50%;
  top:45%;
  left:65%;
  box-shadow:0 0 10px #00ffcc;
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:0.3}
  to{opacity:1}
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  width:100%;
}

.box{
  border:1px solid #00eaff;
  padding:10px;
}

.box button{
  width:100%;
  margin:5px 0;
}

.process{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  border-top:1px solid #00eaff;
  background:black;
  max-height:140px;
  overflow:auto;
  font-size:12px;
}

/* SAVE CSS removed */

@media(max-width:768px){
  body{overflow:auto;}
  #app{
    padding:10px;
    padding-bottom:80px;
  }
  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:5px;
  }
  .main{
    flex-direction:column;
    align-items:center;
    gap:25px;
  }
  .radar{
    width:180px;
    height:180px;
  }
  .grid{
    grid-template-columns:1fr;
    width:100%;
  }
}
</style>
</head>

<body>

<div class="login" id="login">
  <h2>ENTER PASSWORD</h2>
  <input id="pass" type="password">
  <br><br>
  <button onclick="check()">ENTER</button>
  <div id="error" class="error"></div>
</div>
<hr>

<div id="app">

  <div class="header">
    <h1 id="title">SFS CONTROL MATRIX</h1>
    <div class="status">SYSTEM ONLINE</div>
  </div>

  <div class="main">

    <div class="radar">
      <div class="sweep"></div>
      <div class="dot"></div>
    </div>

    <div class="grid">

      <!-- ALL BOXES SAME -->
      <!-- (unchanged, tera full structure intact) -->

    </div>
  </div>

  <div class="process" id="process">> ACCESS GRANTED</div>

</div>

<canvas id="bg"></canvas>

<script>
let audioCtx;
function beep(freq=700){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  let osc=audioCtx.createOscillator();
  let gain=audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value=freq;
  gain.gain.value=0.1;
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

let states = {};

/* save system removed completely */

function check(){
  if(pass.value==="2026"){
    login.style.display="none";
    app.style.display="block";
  }else{
    error.innerText="WRONG PASSWORD";
  }
}

pass.addEventListener("keypress",e=>{
  if(e.key==="Enter") check();
});

function log(msg){
  let time=new Date().toLocaleTimeString();
  let p=document.getElementById("process");
  p.innerHTML="["+time+"] "+msg+"<br>"+p.innerHTML;
}

function run(btn){

  if(!btn.dataset.name){
    btn.dataset.name=btn.innerText;
  }

  let name=btn.dataset.name;
  let title=document.getElementById("title");

  states[name]=!states[name];

  beep();

  btn.style.background=states[name]?"#00eaff22":"black";
  title.innerText=name+(states[name]?" ACTIVATED":" OFF");

  log(name+(states[name]?" ACTIVATED":" DEACTIVATED"));
}

/* STARS SAME */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){
  c.width=window.innerWidth;
  c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<180;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    s:Math.random()*2
  });
}

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,c.width,c.height);

  for(let s of stars){
    ctx.fillStyle="#00eaff";
    ctx.fillRect(s.x,s.y,s.s,s.s);

    s.y+=0.4;

    if(s.y>c.height){
      s.y=0;
      s.x=Math.random()*c.width;
    }
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
