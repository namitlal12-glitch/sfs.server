<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>
body{
  margin:0;
  background:#020a0f;
  color:#00eaff;
  font-family:monospace;
  overflow:hidden;
}

/* ⭐ stars */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* 🔐 login */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
input,button{
  background:black;
  border:1px solid #00eaff;
  color:#00eaff;
  padding:10px;
}
button{cursor:pointer}

/* main */
#main{display:none;padding:20px}

.top{
  display:flex;
  gap:40px;
  align-items:center;
}

/* 🔵 radar */
.radar{
  width:220px;
  height:220px;
  border:3px solid #00eaff;
  border-radius:50%;
  position:relative;
  box-shadow:0 0 20px #00eaff;
  overflow:hidden;
}

/* scan line INSIDE */
.scan{
  position:absolute;
  width:100%;
  height:100%;
  transform-origin:center;
  animation:spin 3s linear infinite;
}
.scan::before{
  content:"";
  position:absolute;
  width:2px;
  height:100%;
  background:#00ffcc;
  left:50%;
}

/* moving dot */
.dot{
  width:6px;
  height:6px;
  background:#00ffcc;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  animation:moveDot 3s linear infinite;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.box{
  border:1px solid #00eaff;
  padding:10px;
}

.btn{
  border:1px solid #00eaff;
  margin:5px 0;
  padding:8px;
  text-align:center;
  cursor:pointer;
}
.btn:hover{background:#00eaff;color:black}

/* processing */
.status{
  margin-top:10px;
  color:#00ffcc;
}

/* animations */
@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

@keyframes moveDot{
  0%{transform:rotate(0deg) translate(80px) rotate(0deg)}
  100%{transform:rotate(360deg) translate(80px) rotate(-360deg)}
}

/* mobile */
@media(max-width:768px){
  .top{flex-direction:column}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- login -->
<div id="login">
  <h2>ENTER PASSWORD</h2>
  <input id="pass" type="password">
  <br>
  <button onclick="check()">ENTER</button>
</div>

<!-- main -->
<div id="main">
  <h2>SFS CONTROL MATRIX</h2>

  <div class="top">
    <div class="radar">
      <div class="scan"></div>
      <div class="dot"></div>
    </div>

    <div class="grid">

      <div class="box">
        CORE SYSTEM
        <div class="btn" onclick="run(this)">INIT</div>
        <div class="btn" onclick="run(this)">SYNC</div>
        <div class="btn" onclick="run(this)">BOOST</div>
        <div class="btn" onclick="run(this)">CHECK</div>
      </div>

      <div class="box">
        SATELLITES
        <div class="btn" onclick="run(this)">SAT-01</div>
        <div class="btn" onclick="run(this)">SAT-02</div>
        <div class="btn" onclick="run(this)">SAT-03</div>
      </div>

      <div class="box">
        SERVERS
        <div class="btn" onclick="run(this)">SRV-01</div>
        <div class="btn" onclick="run(this)">SRV-02</div>
        <div class="btn" onclick="run(this)">SRV-03</div>
      </div>

      <div class="box">
        FLIGHT CONTROL
        <div class="btn" onclick="run(this)">LAUNCH</div>
        <div class="btn" onclick="run(this)">LOCK</div>
        <div class="btn" onclick="run(this)">ENGINE</div>
      </div>

      <div class="box">
        DATA STREAM
        <div class="btn" onclick="run(this)">START</div>
        <div class="btn" onclick="run(this)">STATUS</div>
        <div class="btn" onclick="run(this)">STOP</div>
      </div>

      <div class="box">
        NETWORK
        <div class="btn" onclick="run(this)">NODE</div>
        <div class="btn" onclick="run(this)">SEND</div>
        <div class="btn" onclick="run(this)">SECURE</div>
      </div>

    </div>
  </div>

  <div class="status" id="status"></div>

</div>

<script>
/* password */
function check(){
  let p=document.getElementById("pass").value;
  if(p==="2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
  }else{
    alert("WRONG PASSWORD");
  }
}

/* enter key */
document.getElementById("pass").addEventListener("keypress",e=>{
  if(e.key==="Enter") check();
});

/* processing */
function run(btn){
  let status=document.getElementById("status");
  status.innerText="> PROCESSING "+btn.innerText+"...";
  
  setTimeout(()=>{
    status.innerText="> "+btn.innerText+" DONE ✔";
  },1500);
}

/* stars */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00eaff";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
