<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>
body{
  margin:0;
  background:black;
  color:#00eaff;
  font-family:monospace;
  overflow:hidden;
}

/* BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

input,button{
  padding:10px;
  border:1px solid #00eaff;
  background:black;
  color:#00eaff;
}

button{cursor:pointer}
button:hover{background:#00eaff22}

.error{color:red;margin-top:10px}

/* MAIN */
#app{
  display:none;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

h1{margin:0}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{font-size:12px}

/* LAYOUT */
.main{
  display:flex;
  gap:60px;
  margin-top:20px;
}

/* 🔥 REAL RADAR */
.radar{
  width:240px;
  height:240px;
  border-radius:50%;
  border:2px solid #00eaff;
  box-shadow:0 0 50px #00eaff;
  position:relative;
  overflow:hidden;
}

/* rings */
.radar::before{
  content:"";
  position:absolute;
  inset:20px;
  border-radius:50%;
  border:1px solid #00eaff44;
}
.radar::after{
  content:"";
  position:absolute;
  inset:50px;
  border-radius:50%;
  border:1px solid #00eaff22;
}

/* sweep glow */
.sweep{
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(rgba(0,255,200,0.25) 0deg, transparent 60deg);
  border-radius:50%;
  animation:spin 2s linear infinite;
}

/* dot static blink */
.dot{
  position:absolute;
  width:6px;
  height:6px;
  background:#00ffcc;
  border-radius:50%;
  top:45%;
  left:65%;
  box-shadow:0 0 10px #00ffcc;
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:0.3}
  to{opacity:1}
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  width:100%;
}

.box{
  border:1px solid #00eaff;
  padding:10px;
}

.box button{
  width:100%;
  margin:5px 0;
}

/* PROCESS */
.process{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  border-top:1px solid #00eaff;
  background:black;
}

/* 📱 MOBILE HARD FIX */
@media(max-width:768px){

  body{overflow:auto;}

  #app{
    padding:10px;
  }

  .main{
    flex-direction:column;
    gap:25px;
  }

  .radar{
    width:180px;
    height:180px;
    margin:auto;
  }

  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="login" id="login">
  <h2>ENTER PASSWORD</h2>
  <input id="pass" type="password">
  <br><br>
  <button onclick="check()">ENTER</button>
  <div id="error" class="error"></div>
</div>

<div id="app">

  <div class="header">
    <h1 id="title">SFS CONTROL MATRIX</h1>
    <div class="status">SYSTEM ONLINE</div>
  </div>

  <div class="main">

    <div class="radar">
      <div class="sweep"></div>
      <div class="dot"></div>
    </div>

    <div class="grid">

      <div class="box">
        <h3>CORE SYSTEM</h3>
        <button onclick="run(this)">INIT</button>
        <button onclick="run(this)">SYNC</button>
        <button onclick="run(this)">BOOST</button>
        <button onclick="run(this)">CHECK</button>
      </div>

      <div class="box">
        <h3>SATELLITES</h3>
        <button onclick="run(this)">SAT-01</button>
        <button onclick="run(this)">SAT-02</button>
        <button onclick="run(this)">SAT-03</button>
      </div>

      <div class="box">
        <h3>SERVERS</h3>
        <button onclick="run(this)">SRV-01</button>
        <button onclick="run(this)">SRV-02</button>
        <button onclick="run(this)">SRV-03</button>
      </div>

      <div class="box">
        <h3>FLIGHT CONTROL</h3>
        <button onclick="run(this)">LAUNCH</button>
        <button onclick="run(this)">LOCK</button>
        <button onclick="run(this)">ENGINE</button>
      </div>

      <div class="box">
        <h3>DATA STREAM</h3>
        <button onclick="run(this)">START</button>
        <button onclick="run(this)">STATUS</button>
        <button onclick="run(this)">STOP</button>
      </div>

      <div class="box">
        <h3>NETWORK</h3>
        <button onclick="run(this)">NODE</button>
        <button onclick="run(this)">SEND</button>
        <button onclick="run(this)">SECURE</button>
      </div>

    </div>
  </div>

  <div class="process" id="process">> ACCESS GRANTED</div>
</div>

<canvas id="bg"></canvas>

<script>
function check(){
  if(pass.value==="2026"){
    login.style.display="none";
    app.style.display="block";
  }else{
    error.innerText="WRONG PASSWORD";
  }
}

pass.addEventListener("keypress",e=>{
  if(e.key==="Enter") check();
});

/* 🔊 SOUND */
function beep(){
  let ctx=new AudioContext();
  let osc=ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.frequency.value=600;
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

/* PROCESS + STORY */
function run(btn){

  beep();

  let old=btn.innerText;
  let title=document.getElementById("title");
  let p=document.getElementById("process");

  btn.innerText="PROCESSING...";
  btn.disabled=true;

  title.innerText=old+" PROCESSING...";

  /* 🔥 STORY MODE */
  p.innerText="> DATA TRANSFER START 7 MAY";

  setTimeout(()=>{
    p.innerText="> RFS-1 & RFS-2 LOADING...";
  },800);

  setTimeout(()=>{
    p.innerText="> RFS-3 TRANSFER ACTIVE...";
  },1600);

  setTimeout(()=>{
    p.innerText="> CORRUPT FILE DELETED...";
  },2400);

  setTimeout(()=>{
    p.innerText="> SERVER ROOM SYNC...";
  },3200);

  setTimeout(()=>{
    p.innerText="> COMPLETE 7 AUGUST";
    title.innerText="SUCCESS";
    btn.innerText="DONE";
  },4200);

  setTimeout(()=>{
    btn.innerText=old;
    btn.disabled=false;
    title.innerText="SFS CONTROL MATRIX";
    p.innerText="> ACCESS GRANTED";
  },6000);
}

/* STARS */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){
  c.width=window.innerWidth;
  c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<180;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    s:Math.random()*2
  });
}

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,c.width,c.height);

  for(let s of stars){
    ctx.fillStyle="#00eaff";
    ctx.fillRect(s.x,s.y,s.s,s.s);

    s.y+=0.4;

    if(s.y>c.height){
      s.y=0;
      s.x=Math.random()*c.width;
    }
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
