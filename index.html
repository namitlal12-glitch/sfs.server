<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>
body{
  margin:0;
  background:#020a0f;
  color:#00eaff;
  font-family:monospace;
  overflow:hidden;
}

/* ⭐ stars background */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* 🔐 LOGIN */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
input{
  background:black;
  border:1px solid #00eaff;
  color:#00eaff;
  padding:10px;
}
button{
  margin-top:10px;
  padding:10px 20px;
  background:black;
  border:1px solid #00eaff;
  color:#00eaff;
  cursor:pointer;
}

/* MAIN UI */
#main{
  display:none;
  padding:20px;
}

.top{
  display:flex;
  align-items:center;
  gap:40px;
}

/* 🔵 RADAR */
.radar{
  width:200px;
  height:200px;
  border:3px solid #00eaff;
  border-radius:50%;
  position:relative;
  box-shadow:0 0 20px #00eaff;
}
.radar::before{
  content:"";
  position:absolute;
  width:2px;
  height:100%;
  background:#00ffcc;
  left:50%;
  transform-origin:bottom;
  animation:spin 3s linear infinite;
}
.dot{
  width:6px;
  height:6px;
  background:#00ffcc;
  border-radius:50%;
  position:absolute;
  top:30%;
  left:60%;
  animation:blink 1s infinite;
}

/* boxes */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-top:20px;
}
.box{
  border:1px solid #00eaff;
  padding:10px;
}
.btn{
  border:1px solid #00eaff;
  margin:5px 0;
  padding:8px;
  text-align:center;
  cursor:pointer;
}

/* animations */
@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

/* 📱 mobile */
@media(max-width:768px){
  .top{
    flex-direction:column;
    align-items:center;
  }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- LOGIN -->
<div id="login">
  <h2>ENTER PASSWORD</h2>
  <input id="pass" type="password" placeholder="Enter">
  <br>
  <button onclick="check()">ENTER</button>
</div>

<!-- MAIN -->
<div id="main">
  <h2>SFS CONTROL MATRIX</h2>

  <div class="top">
    <div class="radar">
      <div class="dot"></div>
    </div>

    <div class="grid">
      <div class="box">
        CORE SYSTEM
        <div class="btn">INIT</div>
        <div class="btn">SYNC</div>
        <div class="btn">BOOST</div>
        <div class="btn">CHECK</div>
      </div>

      <div class="box">
        SATELLITES
        <div class="btn">SAT-01</div>
        <div class="btn">SAT-02</div>
        <div class="btn">SAT-03</div>
      </div>

      <div class="box">
        SERVERS
        <div class="btn">SRV-01</div>
        <div class="btn">SRV-02</div>
        <div class="btn">SRV-03</div>
      </div>

      <div class="box">
        DATA STREAM
        <div class="btn">START</div>
        <div class="btn">STATUS</div>
        <div class="btn">STOP</div>
      </div>
    </div>
  </div>
</div>

<script>
/* 🔐 password */
function check(){
  let p=document.getElementById("pass").value;
  if(p==="2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
  }else{
    alert("WRONG PASSWORD");
  }
}

/* ENTER key */
document.getElementById("pass").addEventListener("keypress",function(e){
  if(e.key==="Enter") check();
});

/* ⭐ stars */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<100;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00eaff";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
