<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>
body {
  margin:0;
  background:black;
  color:#00eaff;
  font-family:monospace;
  overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ===== HEADER ===== */
h1{
  text-align:center;
  margin-top:20px;
}

.sub{
  text-align:center;
  opacity:0.7;
}

/* ===== LAYOUT ===== */
.main{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  gap:40px;
  padding:30px;
  flex-wrap:wrap;
}

/* ===== RADAR ===== */
.radar{
  width:220px;
  height:220px;
  border:3px solid #00eaff;
  border-radius:50%;
  position:relative;
  box-shadow:0 0 20px #00eaff;
}

/* rotating line */
.radar::before{
  content:"";
  position:absolute;
  width:50%;
  height:2px;
  background:#00eaff;
  top:50%;
  left:50%;
  transform-origin:left;
  animation:rotate 2s linear infinite;
}

/* dot */
.dot{
  width:6px;
  height:6px;
  background:#00eaff;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:-80px;
  animation:dotMove 2s linear infinite;
}

/* circle rings */
.radar::after{
  content:"";
  position:absolute;
  inset:20px;
  border:1px solid #00eaff55;
  border-radius:50%;
}

/* ===== PANELS ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  max-width:900px;
}

.box{
  border:1px solid #00eaff;
  padding:15px;
}

button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:transparent;
  border:1px solid #00eaff;
  color:#00eaff;
  cursor:pointer;
}

button:hover{
  background:#00eaff22;
}

/* ===== PROCESSING ===== */
.processing{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  border-top:1px solid #00eaff;
  background:black;
}

/* ===== PASSWORD SCREEN ===== */
.login{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

input{
  padding:10px;
  background:black;
  border:1px solid #00eaff;
  color:#00eaff;
}

/* ===== ANIMATION ===== */
@keyframes rotate{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

@keyframes dotMove{
  from{transform:rotate(0deg) translateX(80px)}
  to{transform:rotate(360deg) translateX(80px)}
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div class="login" id="login">
  <h2>ENTER PASSWORD</h2>
  <input id="pass" type="password" placeholder="Password">
  <br><br>
  <button onclick="check()">ENTER</button>
  <p id="msg"></p>
</div>

<!-- MAIN -->
<div id="app" style="display:none;">

<h1>SFS CONTROL MATRIX</h1>
<p class="sub">SYSTEM ONLINE</p>

<div class="main">

  <!-- RADAR -->
  <div class="radar">
    <div class="dot"></div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="box">
      <h3>CORE SYSTEM</h3>
      <button onclick="run()">INIT</button>
      <button onclick="run()">SYNC</button>
      <button onclick="run()">BOOST</button>
      <button onclick="run()">CHECK</button>
    </div>

    <div class="box">
      <h3>SATELLITES</h3>
      <button onclick="run()">SAT-01</button>
      <button onclick="run()">SAT-02</button>
      <button onclick="run()">SAT-03</button>
    </div>

    <div class="box">
      <h3>SERVERS</h3>
      <button onclick="run()">SRV-01</button>
      <button onclick="run()">SRV-02</button>
      <button onclick="run()">SRV-03</button>
    </div>

    <div class="box">
      <h3>FLIGHT CONTROL</h3>
      <button onclick="run()">LAUNCH</button>
      <button onclick="run()">LOCK</button>
      <button onclick="run()">ENGINE</button>
    </div>

    <div class="box">
      <h3>DATA STREAM</h3>
      <button onclick="run()">START</button>
      <button onclick="run()">STATUS</button>
      <button onclick="run()">STOP</button>
    </div>

    <div class="box">
      <h3>NETWORK</h3>
      <button onclick="run()">NODE</button>
      <button onclick="run()">SEND</button>
      <button onclick="run()">SECURE</button>
    </div>

  </div>

</div>

<div class="processing" id="process">> ACCESS GRANTED</div>

</div>

<!-- BACKGROUND CANVAS -->
<canvas id="bg"></canvas>

<script>
// PASSWORD
function check(){
  let p=document.getElementById("pass").value;
  if(p==="2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("msg").innerText="WRONG PASSWORD";
  }
}

// ENTER KEY
document.getElementById("pass").addEventListener("keypress",function(e){
  if(e.key==="Enter") check();
});

// PROCESSING
function run(){
  let el=document.getElementById("process");
  el.innerText="> PROCESSING...";
  setTimeout(()=>{
    el.innerText="> ACCESS GRANTED";
  },1000);
}

/* ===== BACKGROUND STARS ===== */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    s:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let s of stars){
    ctx.fillStyle="#00eaff";
    ctx.fillRect(s.x,s.y,s.s,s.s);
    s.y+=0.3;
    if(s.y>canvas.height) s.y=0;
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
