<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>
hr{
  border:1px solid #00eaff;
  margin:0;
  margin-top:20px;
  margin-bottom:20px;
}
body{
  margin:0;
  background:black;
  color:#00eaff;
  font-family:monospace;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

input,button{
  padding:10px;
  border:1px solid #00eaff;
  background:black;
  color:#00eaff;
}

button{cursor:pointer}
button:hover{background:#00eaff22}

.error{color:red;margin-top:10px}

#app{
  display:none;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

h1{margin:0}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status{font-size:12px}

.main{
  display:flex;
  gap:60px;
  margin-top:20px;
  align-items:flex-start;
}

.radar{
  width:240px;
  height:240px;
  min-width:240px;
  min-height:240px;
  border-radius:50%;
  border:2px solid #00eaff;
  box-shadow:0 0 50px #00eaff;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}

.radar::before{
  content:"";
  position:absolute;
  inset:20px;
  border-radius:50%;
  border:1px solid #00eaff44;
}
.radar::after{
  content:"";
  position:absolute;
  inset:50px;
  border-radius:50%;
  border:1px solid #00eaff22;
}

.sweep{
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(rgba(0,255,200,0.25) 0deg, transparent 60deg);
  border-radius:50%;
  animation:spin 2s linear infinite;
}

.dot{
  position:absolute;
  width:6px;
  height:6px;
  background:#00ffcc;
  border-radius:50%;
  top:45%;
  left:65%;
  box-shadow:0 0 10px #00ffcc;
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:0.3}
  to{opacity:1}
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  width:100%;
}

.box{
  border:1px solid #00eaff;
  padding:10px;
}

.box button{
  width:100%;
  margin:5px 0;
}

.process{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  border-top:1px solid #00eaff;
  background:black;
  max-height:140px;
  overflow:auto;
  font-size:12px;
}

/* ✅ FIXED POSITION */
.saveToggle{
  position:absolute;
  right:20px;
  bottom:12px;
  font-size:12px;
  border:1px solid #00eaff;
  padding:6px 10px;
  cursor:pointer;
  background:black;
}

@media(max-width:768px){
  body{overflow:auto;}
  #app{
    padding:10px;
    padding-bottom:80px;
  }
  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:5px;
  }
  .main{
    flex-direction:column;
    align-items:center;
    gap:25px;
  }
  .radar{
    width:180px;
    height:180px;
  }
  .grid{
    grid-template-columns:1fr;
    width:100%;
  }
}
</style>
</head>

<body>

<div class="login" id="login">
  <h2>ENTER PASSWORD</h2>
  <input id="pass" type="password">
  <br><br>
  <button onclick="check()">ENTER</button>
  <div id="error" class="error"></div>
</div>
<hr>

<div id="app">

  <div class="header">
    <h1 id="title">SFS CONTROL MATRIX</h1>
    <div class="status">SYSTEM ONLINE</div>
  </div>

  <div class="main">

    <div class="radar">
      <div class="sweep"></div>
      <div class="dot"></div>
    </div>

    <div class="grid">

      <!-- SAME BUTTONS -->
      <div class="box">
        <h3>CORE SYSTEM</h3>
        <button onclick="run(this)">INIT</button>
        <button onclick="run(this)">SYNC</button>
        <button onclick="run(this)">BOOST</button>
        <button onclick="run(this)">CHECK</button>
      </div>

      <div class="box">
        <h3>SATELLITES</h3>
        <button onclick="run(this)">SAT-01</button>
        <button onclick="run(this)">SAT-02</button>
        <button onclick="run(this)">SAT-03</button>
      </div>

      <div class="box">
        <h3>SERVERS</h3>
        <button onclick="run(this)">SRV-01</button>
        <button onclick="run(this)">SRV-02</button>
        <button onclick="run(this)">SRV-03</button>
      </div>

      <div class="box">
        <h3>FLIGHT CONTROL</h3>
        <button onclick="run(this)">LAUNCH</button>
        <button onclick="run(this)">LOCK</button>
        <button onclick="run(this)">ENGINE</button>
      </div>

      <div class="box">
        <h3>DATA STREAM</h3>
        <button onclick="run(this)">START</button>
        <button onclick="run(this)">STATUS</button>
        <button onclick="run(this)">STOP</button>
      </div>

      <div class="box">
        <h3>NETWORK</h3>
        <button onclick="run(this)">NODE</button>
        <button onclick="run(this)">SEND</button>
        <button onclick="run(this)">SECURE</button>
      </div>

    </div>
  </div>

  <div class="process" id="process">
    > ACCESS GRANTED
    <div class="saveToggle" onclick="toggleSave()" id="saveBtn">SAVE: OFF</div>
  </div>

</div>

<canvas id="bg"></canvas>

<script>
let states = {};
let saveMode=false;

/* 🔥 TOGGLE SAVE */
function toggleSave(){
  saveMode=!saveMode;
  localStorage.setItem("sfs_saveMode",saveMode);
  document.getElementById("saveBtn").innerText="SAVE: "+(saveMode?"ON":"OFF");
}

/* 🔥 LOAD WITH CONFIRM */
function loadState(){

  let savedData = localStorage.getItem("sfs_states");
  let savedMode = localStorage.getItem("sfs_saveMode");

  if(savedMode==="true"){
    saveMode=true;
    document.getElementById("saveBtn").innerText="SAVE: ON";

    if(savedData){
      let ask = confirm("Do you want to load saved data?");
      if(ask){
        states = JSON.parse(savedData);
      }else{
        localStorage.removeItem("sfs_states");
        states = {};
      }
    }
  }
}

/* 🔥 SAVE */
function saveState(){
  if(saveMode){
    localStorage.setItem("sfs_states",JSON.stringify(states));
  }
}

function check(){
  if(pass.value==="2026"){
    login.style.display="none";
    app.style.display="block";
    loadState();
  }else{
    error.innerText="WRONG PASSWORD";
  }
}

function run(btn){
  let name=btn.innerText;
  states[name]=!states[name];

  btn.style.background=states[name]?"#00eaff22":"black";
  saveState();
}
</script>

</body>
</html>
