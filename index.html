<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  background: black;
  color: #00eaff;
  font-family: monospace;
  overflow-x: hidden;
}

/* ===== TITLE ===== */
h1 {
  text-align: center;
  margin: 20px 0;
  font-size: 32px;
}

/* ===== RADAR ===== */
.radar {
  position: absolute;
  top: 100px;
  left: 60px;
  width: 180px;
  height: 180px;
  border: 2px solid #00eaff;
  border-radius: 50%;
  overflow: hidden;
}

/* rotating line */
.radar::after {
  content: "";
  position: absolute;
  width: 2px;
  height: 100%;
  background: #00ffcc;
  left: 50%;
  transform-origin: bottom;
  animation: rotate 2s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== CONTAINER ===== */
.container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 20px 40px;
}

/* ===== BOX ===== */
.box {
  border: 1px solid #00eaff;
  padding: 15px;
}

.box h2 {
  margin-bottom: 10px;
}

/* ===== BUTTON ===== */
button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  background: transparent;
  border: 1px solid #00eaff;
  color: #00eaff;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #00eaff;
  color: black;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  h1 {
    font-size: 24px;
  }

  .container {
    grid-template-columns: 1fr;
    padding: 10px;
  }

  .radar {
    position: relative;
    margin: 20px auto;
    left: 0;
    top: 0;
  }

  .box {
    width: 95%;
    margin: auto;
  }

}

/* ===== SMALL MOBILE ===== */
@media (max-width: 400px) {

  h1 {
    font-size: 20px;
  }

  button {
    padding: 8px;
    font-size: 12px;
  }

}

</style>
</head>

<body>

<h1>SFS CONTROL MATRIX</h1>

<div class="radar"></div>

<div class="container">

  <div class="box">
    <h2>CORE SYSTEM</h2>
    <button>INIT</button>
    <button>SYNC</button>
    <button>BOOST</button>
    <button>CHECK</button>
  </div>

  <div class="box">
    <h2>SATELLITES</h2>
    <button>SAT-01</button>
    <button>SAT-02</button>
    <button>SAT-03</button>
  </div>

  <div class="box">
    <h2>SERVERS</h2>
    <button>SRV-01</button>
    <button>SRV-02</button>
    <button>SRV-03</button>
  </div>

  <div class="box">
    <h2>FLIGHT CONTROL</h2>
    <button>LAUNCH</button>
    <button>LOCK</button>
    <button>ENGINE</button>
  </div>

  <div class="box">
    <h2>DATA STREAM</h2>
    <button>START</button>
    <button>STATUS</button>
    <button>STOP</button>
  </div>

  <div class="box">
    <h2>NETWORK</h2>
    <button>NODE</button>
    <button>SEND</button>
    <button>SECURE</button>
  </div>

</div>

<script>
document.querySelectorAll("button").forEach(btn => {
  btn.onclick = () => {
    console.log(btn.innerText + " CLICKED");
  };
});
</script>

</body>
</html>
