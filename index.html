<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS CONTROL MATRIX</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: black;
  color: #00eaff;
  font-family: monospace;
}

/* ===== STARS ===== */
#stars {
  position: fixed;
  inset: 0;
  z-index: -1;
}

/* ===== LOGIN SCREEN ===== */
.login {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 20;
}

.login-box {
  border: 1px solid #00eaff;
  padding: 30px;
  text-align: center;
  box-shadow: 0 0 20px #00eaff;
}

input {
  padding: 10px;
  margin-top: 10px;
  background: black;
  border: 1px solid #00eaff;
  color: #00eaff;
  width: 200px;
  text-align: center;
}

.msg {
  margin-top: 10px;
  height: 20px;
}

/* ===== HEADER ===== */
.header {
  padding: 15px 20px;
  border-bottom: 1px solid #00eaff;
  display: flex;
  justify-content: space-between;
}

/* ===== MAIN ===== */
.main {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
  padding: 20px;
}

/* ===== RADAR ===== */
.radar {
  width: 220px;
  height: 220px;
  border: 2px solid #00eaff;
  border-radius: 50%;
  position: relative;
}

.sweep {
  position: absolute;
  width: 2px;
  height: 100%;
  left: 50%;
  background: #00ffcc;
  transform-origin: bottom;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== GRID ===== */
.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.box {
  border: 1px solid #00eaff;
  padding: 15px;
}

button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  background: transparent;
  border: 1px solid #00eaff;
  color: #00eaff;
  cursor: pointer;
}

/* ===== PROCESSING ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
}

.overlay.active { display: flex; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
  }
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>ENTER PASSWORD</h2>
    <input type="password" id="pass" placeholder="Password">
    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- MAIN UI -->
<div id="app" style="display:none;">

<div class="header">
  <div>SFS CONTROL MATRIX</div>
  <div>SYSTEM ONLINE</div>
</div>

<div class="main">

  <div>
    <div class="radar">
      <div class="sweep"></div>
    </div>
  </div>

  <div class="container">

    <div class="box">
      <h2>CORE SYSTEM</h2>
      <button>INIT</button>
      <button>SYNC</button>
      <button>BOOST</button>
      <button>CHECK</button>
    </div>

    <div class="box">
      <h2>SATELLITES</h2>
      <button>SAT-01</button>
      <button>SAT-02</button>
      <button>SAT-03</button>
    </div>

    <div class="box">
      <h2>SERVERS</h2>
      <button>SRV-01</button>
      <button>SRV-02</button>
      <button>SRV-03</button>
    </div>

  </div>

</div>

</div>

<!-- PROCESSING -->
<div class="overlay" id="overlay">
  <h1>ACCESS GRANTED</h1>
</div>

<!-- SOUND -->
<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

/* PASSWORD SYSTEM */
const correct = "2026"; // 
const input = document.getElementById("pass");
const msg = document.getElementById("msg");
const login = document.getElementById("login");
const app = document.getElementById("app");
const overlay = document.getElementById("overlay");

function check() {
  if (input.value === correct) {
    msg.innerText = "ACCESS GRANTED";
    overlay.classList.add("active");

    setTimeout(() => {
      login.style.display = "none";
      app.style.display = "block";
      overlay.classList.remove("active");
    }, 1000);

  } else {
    msg.innerText = "WRONG PASSWORD";
  }
}

/* ENTER KEY */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") check();
});

/* STARS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    v: Math.random() * 0.5 + 0.2
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00eaff";

  stars.forEach(s => {
    ctx.fillRect(s.x, s.y, 2, 2);
    s.y += s.v;
    if (s.y > canvas.height) s.y = 0;
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
